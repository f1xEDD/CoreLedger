version: "3.8"
services:
  pg:
    image: postgres:16-alpine
    container_name: coreledger-pg
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: coreledger
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d coreledger"]
      interval: 3s
      timeout: 3s
      retries: 10